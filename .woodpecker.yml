when:
  - event: push
    branch: main

steps:
  - name: stop-container
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker compose -f /home/joke/docker-compose.yml stop haos

  - name: deploy-artefact
    image: alpine:latest
    commands:
      - rm -rf /usr/build/*
      - cp -r custom_components/salus_it500/* /usr/build/
    volumes:
      - /home/joke/haos/config/custom_components/salus_it500:/usr/build

  - name: rebuild-container
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - docker compose -f /home/joke/docker-compose.yml up -d --build haos